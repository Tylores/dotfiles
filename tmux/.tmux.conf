# Enable mouse support
set -g mouse on

# Set default terminal mode to support 256 colors and true color
set -g default-terminal "tmux-256color"

# Enable true color support
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",kitty:RGB"

# Tokyo Night colors for Tmux
# Background: #1f2335
# Foreground: #c0caf5
# Active: #7aa2f7
# Yellow/Orange: #ff9e64
# Comment/Gray: #565f89

set -g status-style "bg=#1f2335,fg=#c0caf5"

# Border styles
set -g pane-border-style "fg=#1f2335"
set -g pane-active-border-style "fg=#7aa2f7"

# Window status format
set -g window-status-format "#[fg=#565f89,bg=#1f2335] #I: #W "
set -g window-status-current-format "#[fg=#1f2335,bg=#7aa2f7,bold] #I: #W "

# Left status (Session name)
set -g status-left-length 50
set -g status-left "#[fg=#1f2335,bg=#ff9e64,bold] #S #[fg=#ff9e64,bg=#1f2335]"

# Right status (Date and Time)
set -g status-right-length 50
set -g status-right "#[fg=#565f89]#[fg=#1f2335,bg=#565f89] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#565f89]#[fg=#1f2335,bg=#7aa2f7,bold] #h "
